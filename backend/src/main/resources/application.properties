# ============================================
# Book My Flight - Application Configuration
# ============================================

spring.application.name=book-my-flight
server.port=8080

# ---------- H2 Database (Development default) ----------
# In-memory DB avoids local file lock issues during development runs.
spring.datasource.url=jdbc:h2:mem:bookmyflight;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- Flyway ----------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---------- JWT ----------
app.jwt.secret=BookMyFlightSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2024
app.jwt.expiration-ms=3600000

# ---------- OTP ----------
app.otp.expiration-seconds=300
app.otp.length=6

# ---------- CORS ----------
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ---------- Deal Expiry Scheduler ----------
app.scheduler.deal-expiry-cron=0 */5 * * * *
